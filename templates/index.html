<html>
<head>
    <title>Fake News Detection</title>
    <style>
        body {
            font-family: Arial;
            padding: 30px;
            text-align: center;
            background: #f5f5f5;
        }

        textarea {
            width: 60%;
            height: 150px;
            padding: 10px;
        }

        button {
            padding: 12px 25px;
            margin: 10px;
            border: none;
            background: blue;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        .live-btn {
            background: green;
        }
    </style>
</head>
<body>

    <h1>📰 Fake News Detection</h1>

    <!-- ✅ Input -->
    <textarea id="newsInput" placeholder="Enter news here..."></textarea><br>

    <!-- ✅ Button -->
    <button onclick="predictNews()">Check News</button>

    <!-- ✅ Result -->
    <h2 id="result"></h2>

    <!-- ✅ Live News Button (optional, only if backend supports it) -->
    <a href="https://your-app.onrender.com/live-news">
        <button class="live-btn">🔴 Live News Detection</button>
    </a>

    <!-- ✅ JavaScript -->
    <script>
    async function predictNews() {
        const news = document.getElementById("newsInput").value;

        const response = await fetch("https://your-app.onrender.com/predict", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ news: news })
        });

        const data = await response.json();
        document.getElementById("result").innerText = "Prediction: " + data.result;
    }
    </script>

</body>
</html>
