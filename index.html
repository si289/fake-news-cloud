<!DOCTYPE html>
<html>
<head>
    <title>Fake News Detection</title>
    <style>
        body {
            font-family: Arial;
            padding: 30px;
            text-align: center;
            background: #f5f5f5;
        }
        
        textarea {
            width: 60%;
            height: 150px;
            padding: 10px;
        }

        button {
            padding: 12px 25px;
            margin: 10px;
            border: none;
            background: blue;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        .live-btn {
            background: green;
        }
    </style>
</head>
<body>

    <h1>📰 Fake News Detection</h1>

    <form action="/predict" method="POST">
        <textarea name="news" placeholder="Enter news here..."></textarea><br>
        <button type="submit">Check News</button>
    </form>
    
    <!-- ✅ Live News Detection Button -->
    <a href="/live-news">
        <button class="live-btn">🔴 Live News Detection</button>
    </a>

    {% if prediction %}
        <h2>Prediction: {{ prediction }}</h2>
        <h3>Category: {{ category }}</h3>
        <h3>Confidence: {{ confidence }}%</h3>
    {% endif %}

    <script src="script.js"></script>

</body>
</html>
